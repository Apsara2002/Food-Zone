openapi: 3.0.0
info:
  title: Payment Service API
  version: 1.0.0
servers:
  - url: http://localhost:5005
paths:
  /api/payments:
    get:
      summary: Get all payments
      responses:
        '200':
          description: Success
    post:
      summary: Create payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: string
                amount:
                  type: number
                paymentMethod:
                  type: string
      responses:
        '201':
          description: Payment created
  /api/payments/create-stripe-intent:
    post:
      summary: Create Stripe payment intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  description: Amount to charge (in dollars)
                currency:
                  type: string
                  default: usd
                paymentMethodType:
                  type: string
                  default: card
      responses:
        '200':
          description: Stripe payment intent created
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientSecret:
                    type: string
                  paymentIntentId:
                    type: string
        '400':
          description: Bad request
        '500':
          description: Stripe error

