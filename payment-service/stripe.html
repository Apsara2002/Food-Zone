<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Stripe Payment</title>
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .payment-wrapper {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 18px;
      box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 28px;
      line-height: 1.6;
    }

    .amount-box {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 22px;
    }

    .amount-label {
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .amount-value {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #e2e8f0;
    }

    .input,
    #card-element {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      outline: none;
      transition: 0.3s ease;
    }

    .input::placeholder {
      color: #94a3b8;
    }

    .input:focus,
    #card-element.StripeElement--focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.18);
    }

    .pay-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      margin-top: 8px;
    }

    .pay-btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .pay-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .secure-text {
      text-align: center;
      font-size: 12px;
      color: #cbd5e1;
      margin-top: 14px;
    }

    #result {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }

    #result.success {
      display: block;
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.35);
      color: #bbf7d0;
    }

    #result.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="payment-wrapper">
    <div class="logo">S</div>
    <h1>Secure Payment</h1>
    <p class="subtitle">
      Complete your payment safely using Stripe.
    </p>

    <div class="amount-box">
      <div class="amount-label">Amount to pay</div>
      <div class="amount-value">$1.00</div>
    </div>

    <form id="payment-form">
      <div class="form-group">
        <label for="name">Cardholder Name</label>
        <input
          type="text"
          id="name"
          class="input"
          placeholder="Enter cardholder name"
          required
        />
      </div>

      <div class="form-group">
        <label for="card-element">Card Details</label>
        <div id="card-element"></div>
      </div>

      <button id="submit-btn" class="pay-btn" type="submit">
        Pay Now
      </button>

      <p class="secure-text">🔒 Your payment is encrypted and secure.</p>
    </form>

    <div id="result"></div>

    <div class="footer-note">
      Powered by Stripe
    </div>
  </div>

  <script>
    const STRIPE_PUBLISHABLE_KEY = "pk_test_51TE4ZgAJiNzVdq1sXUzVyqrh1g0yW0U9hX2Ft8tH9Jlzs7pfhwYVZQ1v59YbriPYSaLllgUQ5K5rkvuv8Y6xaYdR00sqEEjX4G";
    const BACKEND_URL = "http://localhost:5005/api/payments/create-stripe-intent";
    // Set the amount and orderId dynamically as needed
    const AMOUNT = 100; // cents = $1.00
    const ORDER_ID = "69c0dc4fcbf4439793c5f496"; // Example orderId, replace with dynamic value if needed

    const stripe = Stripe(STRIPE_PUBLISHABLE_KEY);
    const elements = stripe.elements();

    const card = elements.create("card", {
      style: {
        base: {
          color: "#ffffff",
          fontSize: "16px",
          fontFamily: "Inter, Segoe UI, Arial, sans-serif",
          "::placeholder": {
            color: "#94a3b8"
          }
        },
        invalid: {
          color: "#fca5a5"
        }
      }
    });

    card.mount("#card-element");

    const form = document.getElementById("payment-form");
    const resultDiv = document.getElementById("result");
    const submitBtn = document.getElementById("submit-btn");

    function showMessage(message, type) {
      resultDiv.textContent = message;
      resultDiv.className = type;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      submitBtn.disabled = true;
      submitBtn.textContent = "Processing...";

      try {
        const response = await fetch(BACKEND_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: AMOUNT })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || "Failed to create payment intent.");
        }

        const cardholderName = document.getElementById("name").value;

        const { paymentIntent, error } = await stripe.confirmCardPayment(
          data.clientSecret,
          {
            payment_method: {
              card: card,
              billing_details: {
                name: cardholderName
              }
            }
          }
        );

        if (error) {
          showMessage(error.message, "error");
        } else if (paymentIntent && paymentIntent.status === "succeeded") {
          // Update payment status in backend
          fetch("http://localhost:5005/api/payments/update-status", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              orderId: ORDER_ID,
              amount: AMOUNT / 100, // Save as dollars
              status: "Completed"
            })
          });
          showMessage("✅ Payment successful!", "success");
          form.reset();
          card.clear();
        } else {
          showMessage("Payment was not completed.", "error");
        }
      } catch (err) {
        showMessage(err.message || "Something went wrong.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Pay Now";
      }
    });
  </script>
</body>
</html>
