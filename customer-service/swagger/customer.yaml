openapi: 3.0.0
info:
  title: Customer Service API
  version: 1.0.0
servers:
  - url: http://localhost:5001
paths:
  /api/customers:
    get:
      summary: Get all customers
      responses:
        '200':
          description: Success
    post:
      summary: Create a customer
      requestBody:   
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: Customer created
  /api/customers/{id}:
    get:
      summary: Get customer by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
    put:
      summary: Update customer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:   
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                phone:
                  type: string
                address:
                  type: string
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete customer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted